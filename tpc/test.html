<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    header {
      height: 60px; /* your fixed header */
      background: #333;
    }

    iframe {
      flex: 1;       /* takes all remaining space */
      width: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div><img src="test.png"/></div>
  <iframe src="index.html"></iframe>
</body>
</html>
